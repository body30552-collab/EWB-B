<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحلى لمة عيد 🌙✨</title>
    <style>
        body { background: #0f172a; color: #fff; text-align: center; font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; margin: 0; }
        
        #login { 
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('BODY2222.jpeg');
            background-size: cover; background-position: center;
            padding: 40px 20px; border-radius: 30px; border: 2px solid #fbbf24;
        }

        .container { max-width: 450px; margin: 20px auto; background: #1e293b; padding: 25px; border-radius: 30px; border: 2px solid #fbbf24; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #main-content, #gallery, #vid2-box { display: none; }
        video, img { width: 100%; border-radius: 20px; margin-top: 15px; border: 2px solid #fbbf24; }
        
        .mySlides { display: none; width: 100%; border-radius: 20px; border: 2px solid #fbbf24; margin-top: 15px; }
        .fade { animation: fadeAnim 1.5s; }
        @keyframes fadeAnim { from {opacity: 0.4} to {opacity: 1} }

        button { background: linear-gradient(45deg, #fbbf24, #d97706); color: #000; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; font-size: 18px; }
        input { padding: 12px; border-radius: 12px; width: 90%; margin-bottom: 15px; text-align: center; border: 2px solid #fbbf24; background: #0f172a; color: #fff; font-size: 16px; box-sizing: border-box; }
        
        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #ff0000; }
            50% { transform: scale(1.2); text-shadow: 0 0 30px #ff0000; }
            100% { transform: scale(1); text-shadow: 0 0 10px #ff0000; }
        }
    </style>
</head>
<body>

    <div class="container" id="login">
        <div style="font-size: 40px; margin-bottom: 10px;">🎁✨🌙</div>
        <h2>يا أهلاً بـ لمة العيلة!</h2>
        <input type="password" id="pass" placeholder="الباسورد السري...">
        <button onclick="login()">ادخل عيّد علينا 🍬</button>
    </div>

    <div class="container" id="main-content">
        <h1>عيد مبارك يا أحلى عيلة ❤️</h1>
        
        <video id="v1" controls>
            <source src="BODY2.mp4" type="video/mp4">
        </video>

        <div id="vid2-box">
            <video id="v2" controls>
                <source src="BODY22.mp4" type="video/mp4">
            </video>
        </div>

        <div id="gallery">
            <audio id="music"><source src="BODY222.aac" type="audio/aac"></audio>
            <div id="slides-area">
                <img class="mySlides fade" src="BODY2222.jpeg">
                <img class="mySlides fade" src="body1.jpeg">
                <img class="mySlides fade" src="body2.jpeg">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const v1 = document.getElementById("v1");
        const v2 = document.getElementById("v2");
        const v2Box = document.getElementById("vid2-box");
        const gallery = document.getElementById("gallery");
        const music = document.getElementById("music");

        function login() {
            if(document.getElementById("pass").value === "7") {
                document.getElementById("login").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                v1.play(); // بيبدأ الفيديو الأول
            } else { alert("الباسورد غلط!"); }
        }

        // تسلسل الفيديوهات
        v1.onended = function() {
            v1.style.display = "none";
            v2Box.style.display = "block";
            v2.play();
        };

        v2.onended = function() {
            v2Box.style.display = "none";
            gallery.style.display = "block";
            music.play();
            runSlideshow();
        };

        // قفلة الموقع بالقلب
        music.onended = function() {
            document.body.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0f172a;">
                    <h1 style="font-size:150px;animation:pulse 1s infinite;margin:0;">❤️</h1>
                    <h2 style="color:#fbbf24;margin-top:20px;">كل سنة وإحنا سوا ❤️</h2>
                </div>
            `;
        };

        var slideIndex = 0;
        function runSlideshow() {
            var i;
            var slides = document.getElementsByClassName("mySlides");
            for (i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(runSlideshow, 7000); 
        }
    </script>
</body>
</html>
